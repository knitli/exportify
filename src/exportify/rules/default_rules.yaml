# yaml-language-server: $schema=https://raw.githubusercontent.com/knitli/exportify/main/src/exportify/schemas/exportify-config.schema.json

# Default Export Rules for exportify
# This file defines the standard rules for determining which symbols should be exported
# from __init__.py files using the lazy loading pattern.
#
# Rules are evaluated in priority order (highest first). The first matching rule
# determines the export decision. If no rule matches, the symbol is not exported
# (NO_DECISION action).

schema_version: "1.0"
rules:
  # ===================================================================
  # Priority 1000: Explicit exclusions
  # These rules run first to prevent unwanted exports
  # ===================================================================
  - name: ExcludePrivateSymbols
    priority: 1000
    description: Skip all private symbols (names starting with underscore)
    match:
      name_pattern: ^_.*
    action: exclude
  - name: ExcludeStdlibImports
    priority: 1000
    description: >-
      Exclude stdlib imports from being re-exported. Standard library symbols
      imported into a module (e.g. TYPE_CHECKING, MappingProxyType, Path) are
      almost never intended as public re-exports. This does not prevent re-export
      of stdlib symbols if they are explicitly aliased (e.g. `from collections import 
      abc as collections_abc`), which is the explicit signal that a symbol is 
      intended for public re-export. Without this rule, catch-all "include" rules 
      (e.g. PropagateToRoot) would inadvertently re-export every stdlib import, 
      creating circular dependencies and incorrect lazy-import module paths.
    match:
      all_of:
        - member_type: imported
        - is_stdlib: true
    action: exclude
  - name: IncludeDunderVersion
    priority: 999
    description: Always include project metadata dunder symbols (e.g. __version__, __author__) at root level
    match:
      name_pattern: ^__version__$|^__about__$|^__description__$|^__author__$|^__email__$|^__license__$|^__copyright__$|^__credits__$|^__maintainer__$|^__status__$|^__url__$
      # root init or version/about files only
      module_pattern: ^__init__$|^_?_?version_?_?$|^_?_?about_?_?$|^_?_?metadata_?_?$|^_?_?info_?_?$
    action: include
  - name: ExcludeDunderSymbols
    priority: 998
    description: Skip dunder symbols except __all__ which is managed separately
    match:
      name_pattern: ^__.*__$
    action: exclude

  # ===================================================================
  # Priority 950: Import exclusion defaults
  # ===================================================================
  - name: ExcludeNonAliasedImports
    priority: 950
    description: >-
      Exclude non-aliased imported symbols from re-export. When a symbol is
      imported without an alias (e.g. `from .models import BasedModel`), it is
      almost certainly for internal use only — not to be re-exported. Aliased
      imports (handled by ExportImportedSymbols at 600) are the explicit signal
      that a symbol is intended for public re-export. Without this rule,
      catch-all "include" rules (e.g. PropagateToRoot) would inadvertently
      re-export every non-private import, creating circular dependencies and
      incorrect lazy-import module paths.
    match:
      all_of:
        - member_type: imported
        - provenance: imported
    action: exclude

  # ===================================================================
  # Priority 900: Special component exclusions
  # Prevent self-referential or infrastructure issues
  # ===================================================================
  - name: ExcludeLateImportComponents
    priority: 900
    description: Never lazily export lateimport components (prevents circular dependency)
    match:
      any_of:
        - name_pattern: ^lateimport$|^LateImport$|^create_late_getattr$
        - module_pattern: .*\.lateimport\..*
    action: exclude

  # ===================================================================
  # Priority 800: Framework infrastructure
  # Exclude testing and development support code
  # ===================================================================
  - name: ExcludeTestFixtures
    priority: 800
    description: Skip pytest fixtures and test utilities
    match:
      any_of:
        - name_pattern: ^fixture_.*
        - name_pattern: ^pytest_.*
        - module_pattern: .*\.tests?\..*
    action: exclude
  - name: ExcludeDevOnlyFunctions
    priority: 800
    description: Skip functions marked as development-only
    match:
      name_pattern: ^dev_.*
    action: exclude
  # ===================================================================
  # Priority 600: Import handling
  # Determine which imported symbols to re-export
  # ===================================================================
  - name: ExportImportedSymbols
    priority: 600
    description: Export imported symbols (aliased)
    match:
      # export all aliased imports
      all_of:
        - member_type: imported
        - provenance: alias_imported
    action: include
    propagate: root
  # ===================================================================
  # Priority 400: Variable handling
  # Public module-level variables
  # ===================================================================
  - name: ExportPublicVariables
    priority: 400
    description: Exclude public variables (snake_case module-level assignments)
    match:
      member_type: variable
      name_pattern: ^[a-z0-9_]+$
    action: exclude
    propagate: none
  # ===================================================================
  # Priority 300: Propagation overrides
  # Special handling for specific patterns
  #
  # These rules are mostly CodeWeaver specific, but they demonstrate how to use the propagate field to control symbol visibility in the package hierarchy. For example, we want certain core utilities and types to be accessible directly from the package root, even if they are defined in submodules. By setting propagate to root, we ensure that these symbols are included in the __init__.py exports of the package, making them available at the top level of the package namespace. This allows users to import these key symbols directly from the package without needing to know their specific submodule locations, while still keeping the internal module structure organized and maintainable.
  # ===================================================================
  - name: CoreUtilsPropagateToRoot
    priority: 300
    description: Core utilities propagate to package root
    match:
      module_pattern: .*core\.utils$|.*core\.utils\..*
    action: include
    propagate: root
  - name: SpecialUtilitiesPropagateToRoot
    priority: 300
    description: Special utilities propagate to package root
    match:
      member_type: function
      any_of:
        - module_pattern: .*di$|.*di\.(depends|utils)$
          name_pattern: ^depends$|^dependency_provider$
        - module_pattern: .*server.*
          name_pattern: ^find_code$|^lifetime$|^background_services_lifespan$|^http_lifespan$|^create_http_server$|^create_stdio_server$|.*_tool$|^find_code_tool_definition$
        - module_pattern: .*providers\.config$|.*providers\.config\..*
          name_pattern: ^get_profile$
        - module_pattern: .*providers\.data.*$
          name_pattern: .*_tools?$
        - module_pattern: .*engine\.chunker.*$
          name_pattern: ^chunk_files_parallel$|^detect_language_family$|^expand_pattern$|^get_family_patterns$|^detect_family_characteristics$
    action: include
    propagate: root
  - name: EnsureINJECTEDPropagateToRoot
    priority: 300
    description: Ensure INJECTED propagates to root for visibility in public API
    match:
      member_type: constant
      name_exact: INJECTED
    action: include
    propagate: root
  - name: PropagateToRoot
    priority: 300
    description: Core types and exceptions propagate to package root
    match:
      any_of:
        - module_pattern: .*core\.types$|.*core\.types\..*
        - module_pattern: .*\.exceptions$
        - name_pattern: .*Error$
        - name_pattern: .*Exception$
    action: include
    propagate: root
  # ===================================================================
  # Priority 200: General defined symbols
  # These are fallback rules for symbols defined in the module itself.
  # They are lower priority than the 300-series propagation overrides.
  # ===================================================================
  - name: ExportDefinedClasses
    priority: 200
    description: Export classes defined in this module
    match:
      member_type: class
    action: include
    propagate: root
  - name: ExportDefinedFunctions
    priority: 200
    description: Export functions defined in this module (including async)
    match:
      member_type: function
    action: include
    propagate: parent
  - name: ExportSpecialConstants
    priority: 202
    description: Export constants in constants.py and file_extensions.py to root
    match:
      all_of:
        - member_type: constant
        - any_of:
            - module_pattern: .*\.constants$
            - module_pattern: .*\.file_extensions$
    action: include
    propagate: root
  - name: ExportDefinedConstants
    priority: 200
    description: Export constants (SCREAMING_SNAKE_CASE variables)
    match:
      member_type: constant
      name_pattern: ^[A-Z0-9_]+$
    action: include
    propagate: parent
  - name: ExportTypeAliases
    priority: 200
    description: Export type aliases (both Python 3.12+ and pre-3.12 style)
    match:
      member_type: type_alias
    action: include
    propagate: root

  # ===================================================================
  # Priority 0: Default fallback behaviors
  # Catch-all rules for unhandled cases
  # ===================================================================

  - name: DefaultNoDecision
    priority: 0
    description: "Default: no decision (symbol not exported)"
    match:
      name_pattern: .* # Matches everything
    action: no_decision
