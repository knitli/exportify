# CodeWeaver-Specific Export Overrides
#
# This file contains manual overrides for the export rules that are specific to
# the CodeWeaver project. These overrides take priority over all other rules.
#
# Format:
#   schema_version: "1.0"
#   overrides:
#     include:
#       "module.path":
#         - "SymbolName"
#     exclude:
#       "module.path":
#         - "SymbolName"
#
# Include overrides: Force export even if rules would exclude
# Exclude overrides: Force exclusion even if rules would include

schema_version: "1.0"

overrides:
  # ===================================================================
  # Explicit Includes
  # Symbols that should be exported despite default rules
  # ===================================================================
  include:
    # Provider registry - selected re-exports
    "codeweaver.providers":
      - "EmbeddingProvider"    # Base class for embeddings
      - "VectorStoreProvider"  # Base class for vector stores

  # ===================================================================
  # Explicit Excludes
  # Symbols that should NOT be exported despite default rules
  # ===================================================================
  exclude:

    # Test utilities - should not be in production exports
    "codeweaver.tests":
      - "mock_provider"        # Test mock object
      - "fixture_data"         # Test fixture
