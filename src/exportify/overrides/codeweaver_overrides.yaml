# CodeWeaver-Specific Export Overrides
#
# This file contains manual overrides for the export rules that are specific to
# the CodeWeaver project. These overrides take priority over all other rules.
#
# Format:
#   schema_version: "1.0"
#   overrides:
#     include:
#       "module.path":
#         - "SymbolName"
#     exclude:
#       "module.path":
#         - "SymbolName"
#
# Include overrides: Force export even if rules would exclude
# Exclude overrides: Force exclusion even if rules would include

schema_version: "1.0"

overrides:
  # ===================================================================
  # Explicit Includes
  # Symbols that should be exported despite default rules
  # ===================================================================
  include:
    # Core utilities - these are part of the public API
    "codeweaver.core.utils":
      - "create_lazy_getattr"  # Public API for lazy loading
      - "LazyImport"           # Public API for lazy loading
      - "lazy_import"          # Public API for lazy loading

    # Common utilities needed across the codebase
    "codeweaver.common.utils":
      - "normalize_path"       # Path handling utility
      - "ensure_absolute"      # Path handling utility

    # Provider registry - selected re-exports
    "codeweaver.providers":
      - "EmbeddingProvider"    # Base class for embeddings
      - "VectorStoreProvider"  # Base class for vector stores

  # ===================================================================
  # Explicit Excludes
  # Symbols that should NOT be exported despite default rules
  # ===================================================================
  exclude:
    # MCP server internals - not part of public API
    "codeweaver.server.mcp":
      - "dev_only_function"    # Development/debugging only
      - "internal_setup"       # Internal initialization

    # Test utilities - should not be in production exports
    "codeweaver.tests":
      - "mock_provider"        # Test mock object
      - "fixture_data"         # Test fixture

    # Internal implementation details
    "codeweaver.engine.indexer":
      - "_build_index"         # Internal method
      - "_process_batch"       # Internal method

    # Deprecated symbols (keep for backward compat but don't advertise)
    "codeweaver.core.types":
      - "LegacyModel"          # Deprecated, will be removed
      - "OldAlias"             # Deprecated, will be removed
